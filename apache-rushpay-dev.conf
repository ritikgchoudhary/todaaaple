# Apache (aaPanel): rushpay.online → Development server
# Backend API → :4001, Frontend React dev → :3000
#
# aaPanel me: Website → rushpay.online → Config (ya "Proxy" / "Reverse proxy") me
# is file ka content copy karo, ya include karo.
#
# Required modules (aaPanel me usually already on):
#   a2enmod proxy proxy_http proxy_wstunnel rewrite
#   systemctl reload apache2

<VirtualHost *:80>
    ServerName rushpay.online
    ServerAlias www.rushpay.online

    # API / backend → Node on 4001
    ProxyPass /user/       http://127.0.0.1:4001/user/
    ProxyPassReverse /user/ http://127.0.0.1:4001/user/

    ProxyPass /getUser/    http://127.0.0.1:4001/getUser/
    ProxyPassReverse /getUser/ http://127.0.0.1:4001/getUser/

    ProxyPass /admin-api/  http://127.0.0.1:4001/admin-api/
    ProxyPassReverse /admin-api/ http://127.0.0.1:4001/admin-api/

    ProxyPass /api/        http://127.0.0.1:4001/api/
    ProxyPassReverse /api/ http://127.0.0.1:4001/api/

    ProxyPass /game/       http://127.0.0.1:4001/game/
    ProxyPassReverse /game/ http://127.0.0.1:4001/game/

    ProxyPass /data/       http://127.0.0.1:4001/data/
    ProxyPassReverse /data/ http://127.0.0.1:4001/data/

    ProxyPass /health      http://127.0.0.1:4001/health
    ProxyPassReverse /health http://127.0.0.1:4001/health

    # WebSocket (React dev hot reload)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /sockjs-node/(.*) ws://127.0.0.1:3000/sockjs-node/$1 [P,L]
    ProxyPass /sockjs-node/ http://127.0.0.1:3000/sockjs-node/
    ProxyPassReverse /sockjs-node/ http://127.0.0.1:3000/sockjs-node/

    # Sab kuch baaki → React dev server on 3000
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
</VirtualHost>

# HTTPS (SSL) — jab aaPanel me rushpay.online pe SSL enable karo, same ProxyPass blocks
# SSL VirtualHost me bhi add karo. Example:
#
# <VirtualHost *:443>
#     ServerName rushpay.online
#     ServerAlias www.rushpay.online
#     SSLEngine on
#     # SSLCertificateFile / SSLCertificateKeyFile aaPanel apne aap set karta hai
#
#     ProxyPass /user/       http://127.0.0.1:4001/user/
#     ProxyPassReverse /user/ http://127.0.0.1:4001/user/
#     ... (baaki same ProxyPass lines)
#     ProxyPass / http://127.0.0.1:3000/
#     ProxyPassReverse / http://127.0.0.1:3000/
#     ProxyPreserveHost On
#     RequestHeader set X-Forwarded-Proto "https"
# </VirtualHost>
