# Nginx: https://rushpay.online — frontend + backend DONO isi domain pe
# Backend (Node) port 4001 pe chalega; woh API + React build (frontend/build) dono serve karta hai.
# Is config ko apne server pe include karo (e.g. sites-available ya conf.d).

# HTTP → HTTPS redirect (optional, agar SSL already hai to)
server {
    listen 80;
    listen [::]:80;
    server_name rushpay.online www.rushpay.online;
    return 301 https://$server_name$request_uri;
}

# HTTPS — saari request backend (4001) ko
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rushpay.online www.rushpay.online;

    # SSL (apne certificate path se replace karo)
    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    # Saari traffic → Node backend (API + static frontend dono yahi serve karta hai)
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
